name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    name: macOS validation
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Validate shell scripts
        run: |
          for script in \
            script/build_and_run.sh \
            script/check_release_runner.sh \
            script/configure_github_release_secrets.sh \
            script/create_github_draft_release.sh \
            script/package_release.sh \
            script/perf_large_repo.sh \
            script/perf_ui_sample.sh; do
            bash -n "$script"
          done

      - name: Run Swift tests
        run: swift test

      - name: Run performance smoke
        run: ./script/perf_large_repo.sh

      - name: Verify release bundle
        run: ./script/package_release.sh --verify

      - name: Verify release archive
        run: ./script/package_release.sh --verify-archive

      - name: Verify release artifacts
        run: ./script/package_release.sh --verify-artifacts
