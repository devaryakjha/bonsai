name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    name: Jarvis macOS validation
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - jarvis

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Validate shell scripts
        run: make validate-scripts

      - name: Run Swift tests
        run: make test

      - name: Run performance smoke
        run: make perf

      - name: Verify release bundle
        run: make release-verify

      - name: Verify release archive
        run: make release-verify-archive

      - name: Verify release artifacts
        run: make release-verify-artifacts
