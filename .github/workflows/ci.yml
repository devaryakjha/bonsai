name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    name: macOS validation
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Validate shell scripts
        run: |
          for script in script/build_and_run.sh script/package_release.sh script/perf_large_repo.sh; do
            bash -n "$script"
          done

      - name: Run Swift tests
        run: swift test

      - name: Verify release bundle
        run: ./script/package_release.sh --verify
