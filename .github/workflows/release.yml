name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version. Defaults to VERSION.
        required: false
        type: string
      build_number:
        description: Build number. Defaults to the GitHub run number.
        required: false
        type: string

permissions:
  contents: write

jobs:
  notarize:
    name: Notarized macOS artifact
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - jarvis
    environment: release

    env:
      BONSAI_CODESIGN_IDENTITY: ${{ secrets.BONSAI_CODESIGN_IDENTITY }}
      BONSAI_NOTARY_PROFILE: bonsai-ci-notary

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          curl --version | sed -n '1p'
          jq --version

      - name: Resolve release metadata
        run: |
          version="${{ inputs.version }}"
          build_number="${{ inputs.build_number }}"
          if [[ -z "$version" ]]; then
            version="$(tr -d '[:space:]' < VERSION)"
          fi
          if [[ -z "$build_number" ]]; then
            build_number="${{ github.run_number }}"
          fi
          {
            echo "BONSAI_VERSION=$version"
            echo "BONSAI_BUILD_NUMBER=$build_number"
            echo "BONSAI_NOTARY_KEYCHAIN=$RUNNER_TEMP/bonsai-signing.keychain-db"
          } >> "$GITHUB_ENV"

      - name: Validate source
        run: |
          git diff --check
          bash -n script/build_and_run.sh
          bash -n script/check_release_runner.sh
          bash -n script/configure_github_release_secrets.sh
          bash -n script/package_release.sh
          bash -n script/perf_large_repo.sh
          swift test

      - name: Check release secrets
        env:
          BONSAI_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.BONSAI_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          BONSAI_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.BONSAI_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          BONSAI_NOTARY_APPLE_ID: ${{ secrets.BONSAI_NOTARY_APPLE_ID }}
          BONSAI_NOTARY_APP_PASSWORD: ${{ secrets.BONSAI_NOTARY_APP_PASSWORD }}
          BONSAI_NOTARY_TEAM_ID: ${{ secrets.BONSAI_NOTARY_TEAM_ID }}
        run: |
          missing=0
          for name in \
            BONSAI_CODESIGN_IDENTITY \
            BONSAI_DEVELOPER_ID_CERTIFICATE_BASE64 \
            BONSAI_DEVELOPER_ID_CERTIFICATE_PASSWORD \
            BONSAI_NOTARY_APPLE_ID \
            BONSAI_NOTARY_APP_PASSWORD \
            BONSAI_NOTARY_TEAM_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "$name is required"
              missing=1
            fi
          done
          exit "$missing"

      - name: Create signing keychain
        env:
          BONSAI_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.BONSAI_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          BONSAI_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.BONSAI_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          keychain_password="$(openssl rand -base64 32)"
          echo "::add-mask::$keychain_password"
          security create-keychain -p "$keychain_password" "$BONSAI_NOTARY_KEYCHAIN"
          security set-keychain-settings -lut 21600 "$BONSAI_NOTARY_KEYCHAIN"
          security unlock-keychain -p "$keychain_password" "$BONSAI_NOTARY_KEYCHAIN"
          security list-keychains -d user -s "$BONSAI_NOTARY_KEYCHAIN"
          security default-keychain -s "$BONSAI_NOTARY_KEYCHAIN"

          certificate_path="$RUNNER_TEMP/bonsai-developer-id.p12"
          printf '%s' "$BONSAI_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security import "$certificate_path" \
            -k "$BONSAI_NOTARY_KEYCHAIN" \
            -P "$BONSAI_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$BONSAI_NOTARY_KEYCHAIN"
          rm -f "$certificate_path"

      - name: Store notarization credentials
        env:
          BONSAI_NOTARY_APPLE_ID: ${{ secrets.BONSAI_NOTARY_APPLE_ID }}
          BONSAI_NOTARY_APP_PASSWORD: ${{ secrets.BONSAI_NOTARY_APP_PASSWORD }}
          BONSAI_NOTARY_TEAM_ID: ${{ secrets.BONSAI_NOTARY_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "$BONSAI_NOTARY_PROFILE" \
            --apple-id "$BONSAI_NOTARY_APPLE_ID" \
            --team-id "$BONSAI_NOTARY_TEAM_ID" \
            --password "$BONSAI_NOTARY_APP_PASSWORD" \
            --keychain "$BONSAI_NOTARY_KEYCHAIN"

      - name: Check release credentials
        run: |
          ./script/package_release.sh --doctor
          ./script/package_release.sh --check-credentials

      - name: Build signed and notarized archive
        run: ./script/package_release.sh --notarize

      - name: Verify release artifacts
        run: ./script/package_release.sh --verify-artifacts

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: Bonsai-${{ env.BONSAI_VERSION }}-${{ env.BONSAI_BUILD_NUMBER }}
          path: |
            dist/release/Bonsai.zip
            dist/release/Bonsai.release.plist
          if-no-files-found: error
          retention-days: 30

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          api_base="https://api.github.com/repos/$GITHUB_REPOSITORY"
          auth_headers=(
            -H "Authorization: Bearer $GH_TOKEN"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          release_tag="v$BONSAI_VERSION"
          notes_path="$RUNNER_TEMP/bonsai-release-notes.md"
          lookup_response="$RUNNER_TEMP/bonsai-release-lookup.json"
          lookup_status="$(
            curl -sS \
              -o "$lookup_response" \
              -w "%{http_code}" \
              "${auth_headers[@]}" \
              "$api_base/releases/tags/$release_tag"
          )"
          if [[ "$lookup_status" == "200" ]]; then
            echo "GitHub release already exists for $release_tag"
            exit 1
          fi
          if [[ "$lookup_status" != "404" ]]; then
            echo "GitHub release lookup failed with status $lookup_status"
            cat "$lookup_response"
            exit 1
          fi

          cat > "$notes_path" <<NOTES
          Bonsai $BONSAI_VERSION ($BONSAI_BUILD_NUMBER)

          Native macOS Git client v0 release candidate.

          Evidence:
          - Fork-parity matrix: Specs/0242-v0-parity-evidence.md
          - Completion audit: Specs/0259-v0-completion-audit.md
          - Release checklist: Documentation/ReleaseChecklist.md

          Attachments:
          - Bonsai.zip
          - Bonsai.release.plist

          Keep this release as a draft until the downloaded artifact passes the post-release Gatekeeper and smoke checks.
          NOTES

          create_payload="$RUNNER_TEMP/bonsai-release-payload.json"
          create_response="$RUNNER_TEMP/bonsai-release-response.json"
          jq -n \
            --arg tag_name "$release_tag" \
            --arg target_commitish "$GITHUB_SHA" \
            --arg name "Bonsai $BONSAI_VERSION" \
            --arg body "$(cat "$notes_path")" \
            '{tag_name: $tag_name, target_commitish: $target_commitish, name: $name, body: $body, draft: true, prerelease: false}' \
            > "$create_payload"

          create_status="$(
            curl -sS \
              -X POST \
              -o "$create_response" \
              -w "%{http_code}" \
              "${auth_headers[@]}" \
              -H "Content-Type: application/json" \
              --data-binary "@$create_payload" \
              "$api_base/releases"
          )"
          if [[ "$create_status" != "201" ]]; then
            echo "GitHub draft release creation failed with status $create_status"
            cat "$create_response"
            exit 1
          fi

          release_id="$(jq -r '.id' "$create_response")"
          upload_url="https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$release_id/assets"
          for asset in dist/release/Bonsai.zip dist/release/Bonsai.release.plist; do
            asset_name="$(basename "$asset")"
            upload_response="$RUNNER_TEMP/bonsai-release-upload-$asset_name.json"
            upload_status="$(
              curl -sS \
                -X POST \
                -o "$upload_response" \
                -w "%{http_code}" \
                "${auth_headers[@]}" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@$asset" \
                "$upload_url?name=$asset_name"
            )"
            if [[ "$upload_status" != "201" ]]; then
              echo "GitHub release asset upload failed for $asset_name with status $upload_status"
              cat "$upload_response"
              curl -sS \
                -X DELETE \
                "${auth_headers[@]}" \
                "$api_base/releases/$release_id" \
                >/dev/null \
                || true
              exit 1
            fi
          done

      - name: Clean up signing keychain
        if: always()
        run: |
          if [[ -n "${BONSAI_NOTARY_KEYCHAIN:-}" && -f "$BONSAI_NOTARY_KEYCHAIN" ]]; then
            security delete-keychain "$BONSAI_NOTARY_KEYCHAIN"
          fi
